<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Park Suhee</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #efefec;
      font-family: 'Montserrat', sans-serif;
      color: #222;
    }

    .container {
      padding: 40px 60px;
    }

    .top-text {
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .top-text a {
      text-decoration: none;
      color: #222;
      margin-right: 10px;
    }

    .top-text a:hover {
      color: #00bfa6;
    }

    .intro {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 60px;
    }

    .intro img {
      width: 150px;
      border-radius: 50%;
    }

    .intro h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .skills {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .box {
      width: 30%;
      margin-bottom: 40px;
    }

    .box h3 {
      margin-bottom: 20px;
    }

    .circle {
      display: inline-block;
      border: 2px solid #333;
      border-radius: 50%;
      padding: 20px;
      margin: 10px;
    }

    @media (max-width: 768px) {
      .intro {
        flex-direction: column;
        text-align: center;
      }

      .box {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-text">
    <a href="park.html">PARK SUHEE</a> /
    <a href="mom.html">MOM</a> /
    <a href="professor.html">PROFESSOR</a>
  </div>

  <div class="intro">
    <img src="person.png">
    <div>
      <h1>HELLO,</h1>
      <p>my name is Park Suhee.<br>
      I am a creative designer and illustrator.</p>
    </div>
  </div>

  <div class="skills">

    <div class="box">
      <h3>SKILLS</h3>
      <p>Branding<br>Illustration<br>Packaging</p>
    </div>

    <div class="box">
      <h3>SOFTWARE</h3>
      <div class="circle">Ps</div>
      <div class="circle">Ai</div>
      <div class="circle">Ae</div>
    </div>

    <div class="box">
      <h3>LANGUAGE</h3>
      <p>Korean<br>English</p>
    </div>

  </div>

</div>

</body>
</html>
